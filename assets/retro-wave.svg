<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0A0F"/>
      <stop offset="1" stop-color="#141424"/>
    </linearGradient>
    <linearGradient id="neon" x1="180" y1="80" x2="1020" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6FE7FF"/>
      <stop offset="1" stop-color="#B58CFF"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" stroke="#5F5F8A" stroke-opacity="0.22" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="280" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="280" rx="18" fill="url(#grid)">
    <animateTransform attributeName="transform" type="translate" values="0 0; -40 0" dur="6s" repeatCount="indefinite"/>
  </rect>

  <path d="M0 190 C 120 165, 200 225, 320 190 C 440 155, 520 225, 640 190 C 760 155, 840 225, 960 190 C 1080 155, 1140 210, 1200 190" stroke="#6FE7FF" stroke-opacity="0.5" stroke-width="2" fill="none">
    <animate attributeName="d" dur="5.2s" repeatCount="indefinite"
      values="M0 190 C 120 165, 200 225, 320 190 C 440 155, 520 225, 640 190 C 760 155, 840 225, 960 190 C 1080 155, 1140 210, 1200 190;
              M0 200 C 120 230, 200 160, 320 200 C 440 240, 520 160, 640 200 C 760 240, 840 160, 960 200 C 1080 240, 1140 170, 1200 200;
              M0 190 C 120 165, 200 225, 320 190 C 440 155, 520 225, 640 190 C 760 155, 840 225, 960 190 C 1080 155, 1140 210, 1200 190"/>
  </path>

  <text x="600" y="132" text-anchor="middle" font-family="monospace" font-size="58" font-weight="700" letter-spacing="6" fill="url(#neon)" filter="url(#glow)">
    VINCENT PEREZ
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0; 0 4; 0 0" dur="3.8s" repeatCount="indefinite"/>
  </text>
  <text x="600" y="172" text-anchor="middle" font-family="monospace" font-size="18" letter-spacing="4" fill="#C8C8DA">
    RETRO SYSTEMS • FULL-STACK • NETWORK TECHNOLOGY • AI
  </text>

  <rect x="28" y="24" width="12" height="12" rx="2" fill="#6FE7FF">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.1s" repeatCount="indefinite"/>
  </rect>
  <rect x="48" y="24" width="12" height="12" rx="2" fill="#B58CFF">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
  <rect x="68" y="24" width="12" height="12" rx="2" fill="#89A1FF">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.1s" begin="0.25s" repeatCount="indefinite"/>
  </rect>
</svg>
